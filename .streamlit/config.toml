# .streamlit/config.toml
# ======================
# Fix 5: enableCORS and enableXsrfProtection must agree.
# Setting both to true is the secure default for Streamlit Community Cloud.
# If you run behind a reverse proxy that sets its own CORS headers, you can
# set enableCORS = false AND enableXsrfProtection = false together — but
# never mix them (that is what triggered the warning).

[server]
enableCORS            = true
enableXsrfProtection  = true

[browser]
# Suppress the "Are you sure you want to leave?" dialog during development
gatherUsageStats = false
